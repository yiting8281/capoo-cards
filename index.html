<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>貓貓蟲咖波收藏卡牌線上圖鑑登記本</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f0f7ff; }
        .card-gray { filter: grayscale(100%); opacity: 0.35; }
        
        /* 固定 5:7 黃金比例框 */
        .capoo-card-box {
            position: relative;
            width: 100%;
            padding-top: 140%; 
            border-radius: 0.5rem;
            background-color: #f8fafc;
            border: 1px solid #e2e8f0;
            overflow: hidden;
        }
        .capoo-sprite {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-repeat: no-repeat;
            background-size: 301% auto; /* 橫向固定 3 欄放大 */
        }
    </style>
</head>
<body class="p-3 md:p-8">

    <div class="max-w-6xl mx-auto">
        <header class="text-center mb-5">
            <h1 class="text-2xl font-bold text-sky-700 mb-1">🐱 貓貓蟲咖波收藏卡牌圖鑑 🍖</h1>
            <p class="text-xs text-sky-600 font-medium">✨ 人工位子辨認・長圖完美鎖定版 (NO.001 - NO.099) ✨</p>
        </header>

        <div class="bg-white rounded-xl p-4 shadow-sm mb-5 grid grid-cols-1 md:grid-cols-3 gap-3 items-center">
            <div class="md:col-span-2">
                <div class="flex justify-between mb-1 font-bold text-slate-700 text-xs">
                    <span>總收集進度</span>
                    <span id="progress-text">0 / 99 款 (0%)</span>
                </div>
                <div class="w-full bg-slate-100 rounded-full h-3 overflow-hidden">
                    <div id="progress-bar" class="bg-gradient-to-r from-sky-400 to-sky-500 h-full transition-all duration-300" style="width: 0%"></div>
                </div>
                <div class="text-[11px] text-slate-400 mt-1 flex gap-4">
                    <span>已收集：<span id="unique-count" class="font-bold text-sky-600">0</span> 款</span>
                    <span>重複卡：<span id="duplicate-count" class="font-bold text-orange-500">0</span> 張</span>
                </div>
            </div>
            
            <div class="flex flex-col gap-2">
                <select id="filter-type" class="w-full border border-slate-200 rounded-lg p-2 text-xs font-bold text-slate-700 focus:outline-none focus:ring-2 focus:ring-sky-400 bg-slate-50">
                    <option value="all">顯示全部卡牌 (NO.001 - NO.099)</option>
                    <optgroup label="🔍 狀態與重複篩選">
                        <option value="owned">僅顯示：已擁有</option>
                        <option value="missing">僅顯示：未擁有 (缺卡)</option>
                        <option value="duplicate">🔥 僅顯示：重複的卡 (交換用)</option>
                    </optgroup>
                    <optgroup label="🌈 依手寫筆記星等篩選">
                        <option value="star-color">🌈 彩星 頂級卡</option>
                        <option value="star-gold">👑 金星 稀有卡</option>
                        <option value="star-silver">🪙 銀星 珍藏卡</option>
                        <option value="star-white">⬜ 白星 常規卡</option>
                    </optgroup>
                    <optgroup label="✨ 經典系列 1.0 (001-035)">
                        <option value="v1-all">1.0 全部</option>
                    </optgroup>
                    <optgroup label="🍧 經典系列 2.0 (036-065)">
                        <option value="v2-all">2.0 全部</option>
                    </optgroup>
                    <optgroup label="🤖 經典系列 3.0 (066-099)">
                        <option value="v3-all">3.0 全部</option>
                    </optgroup>
                </select>
                <div class="flex gap-2">
                    <button onclick="exportData()" class="flex-1 text-[10px] bg-slate-100 text-slate-600 font-bold py-1 rounded">📤 備份代碼</button>
                    <button onclick="importData()" class="flex-1 text-[10px] bg-slate-100 text-slate-600 font-bold py-1 rounded">📥 匯入進度</button>
                </div>
            </div>
        </div>

        <div id="cards-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-2.5"></div>
    </div>

    <script>
        const cardData = [];
        const silvers = [72,73,75,78,79,82,83,89,95,97, 4, 10, 12, 14, 17, 20, 23, 27, 28, 33, 34, 35, 36, 39, 40, 44, 47, 51, 53, 54, 62, 65];
        const golds = [69,74,85,96, 13, 15, 16, 26, 38, 45, 55, 60, 64];
        const colors = [77, 86, 93, 42, 57];

        // 人工判定核心：精確換算出卡片在各自長圖上的 Y 軸百分比 (跳過了大主題橫幅，精準置中)
        function getYPercent(id, gen) {
            let row = 0, startY = 14.85, stepY = 10.36;
            
            if (gen === 'v1') {
                if (id <= 15) return 14.85 + Math.floor((id-1)/3) * 10.36;
                if (id <= 20) return 67.20 + Math.floor((id-16)/2) * 10.36; // 生日
                if (id <= 25) return 78.05 + Math.floor((id-21)/3) * 10.36; // 夏日
                if (id <= 30) return 88.90 + Math.floor((id-26)/3) * 10.36; // 美式
                return 99.40; // 門市抽
            } else if (gen === 'v2') {
                if (id <= 50) return 14.18 + Math.floor((id-36)/3) * 10.31;
                if (id <= 60) return 66.25 + Math.floor((id-51)/3) * 10.31; // 百味
                return 97.80; // 懶洋洋
            } else {
                if (id <= 74) return 13.95 + Math.floor((id-66)/3) * 10.43;
                if (id <= 85) return 56.25 + Math.floor((id-75)/3) * 10.43; // BABY
                if (id <= 90) return 77.65 + Math.floor((id-86)/2) * 10.43; // Cyber
                if (id <= 95) return 88.60 + Math.floor((id-91)/2) * 10.43; // 祭典
                return 99.55; // 郊遊
            }
        }

        function getXPercent(id, gen) {
            if (gen === 'v1' && id >= 16 && id <= 20) return (id-16)%2 * 50; // 2欄排版
            if (gen === 'v1' && id >= 31) return (id-31)%2 * 50;
            if (gen === 'v3' && id >= 86) {
                if (id <= 90) return (id-86)%2 * 50;
                if (id <= 95) return (id-91)%2 * 50;
                return (id-96)%2 * 50;
            }
            return ((id - 1) % 3) * 50; // 標準 3 欄 (0%, 50%, 100%)
        }

        // 建立資料
        for (let i = 1; i <= 99; i++) {
            const idStr = i.toString().padStart(3, '0');
            let gen = i <= 35 ? "v1" : (i <= 65 ? "v2" : "v3");       
            let subName = i <= 35 ? "1.0 系列" : (i <= 65 ? "2.0 系列" : "3.0 系列");   
            let tagClass = i <= 35 ? "bg-blue-50 text-blue-600 border-blue-100" : (i <= 65 ? "bg-amber-50 text-amber-600 border-amber-100" : "bg-purple-50 text-purple-600 border-purple-100");
            
            let starType = "star-white";
            let starName = "⬜ 白星 常規";
            let starClass = "bg-slate-100 text-slate-600 border-slate-200";

            if (colors.includes(i)) {
                starType = "star-color"; starName = "🌈 彩星 頂級"; starClass = "bg-gradient-to-r from-red-100 via-orange-100 to-yellow-100 text-red-700 border-orange-300 font-bold";
            } else if (golds.includes(i)) {
                starType = "star-gold"; starName = "👑 金星 稀有"; starClass = "bg-amber-100 text-amber-700 border-amber-300";
            } else if (silvers.includes(i)) {
                starType = "star-silver"; starName = "🪙 銀星 珍藏"; starClass = "bg-zinc-100 text-zinc-700 border-zinc-300";
            }

            // 用標準的 background-position 百分比對齊
            const posX = getXPercent(i, gen);
            const rawY = getYPercent(i, gen);
            const posY = (rawY / (100 - 10.38)) * 100; // 換算為 CSS 滾動百分比
            const spriteStyle = `background-image: url('${gen}.jpg'); background-position: ${posX}% ${posY}%;`;

            cardData.push({
                idStr: idStr,
                gen: gen,
                subType: gen + "-all",
                subName: subName,
                tagClass: tagClass,
                spriteStyle: spriteStyle,
                starType: starType,
                starName: starName,
                starClass: starClass
            });
        }

        let myCollection = JSON.parse(localStorage.getItem('capoo_cards_manual_fixed_v3')) || {};
        cardData.forEach(card => { if (myCollection[card.idStr] === undefined) myCollection[card.idStr] = 0; });

        const cardsGrid = document.getElementById('cards-grid');
        const filterType = document.getElementById('filter-type');

        function renderCards() {
            cardsGrid.innerHTML = '';
            const filter = filterType.value;
            let ownedCount = 0, duplicateCount = 0;

            cardData.forEach(card => {
                const count = myCollection[card.idStr] || 0;
                if (count > 0) ownedCount++;
                if (count > 1) duplicateCount += (count - 1);
            });

            const percent = Math.round((ownedCount / 99) * 100);
            document.getElementById('progress-text').innerText = `${ownedCount} / 99 款 (${percent}%)`;
            document.getElementById('progress-bar').style.width = `${percent}%`;
            document.getElementById('unique-count').innerText = ownedCount;
            document.getElementById('duplicate-count').innerText = duplicateCount;

            cardData.forEach(card => {
                const count = myCollection[card.idStr] || 0;
                
                if (filter !== 'all') {
                    if (filter
