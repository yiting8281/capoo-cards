<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>貓貓蟲咖波收藏卡牌線上圖鑑登記本</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f0f7ff; }
        .card-gray { filter: grayscale(100%); opacity: 0.35; }
        
        /* 終極解決方案：利用 CSS 背景圖百分比定位，這在任何螢幕大小下都絕對不會歪掉 */
        .capoo-card-box {
            position: relative;
            width: 100%;
            padding-top: 140%; /* 嚴格鎖定卡牌的 5:7 黃金比例外框 */
            border-radius: 0.5rem;
            background-color: #f8fafc;
            border: 1px solid #e2e8f0;
            overflow: hidden;
        }
        .capoo-sprite {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-repeat: no-repeat;
            background-size: 300% auto; /* 因為長圖橫向固定是 3 欄，所以寬度固定放大到 3 倍 */
        }
    </style>
</head>
<body class="p-3 md:p-8">

    <div class="max-w-6xl mx-auto">
        <header class="text-center mb-5">
            <h1 class="text-2xl font-bold text-sky-700 mb-1">🐱 貓貓蟲咖波收藏卡牌圖鑑 🍖</h1>
            <p class="text-xs text-sky-600 font-medium">✨ 本地長圖 CSS 百分比鎖定版・絕不移位 (NO.001 - NO.099) ✨</p>
        </header>

        <div class="bg-white rounded-xl p-4 shadow-sm mb-5 grid grid-cols-1 md:grid-cols-3 gap-3 items-center">
            <div class="md:col-span-2">
                <div class="flex justify-between mb-1 font-bold text-slate-700 text-xs">
                    <span>總收集進度</span>
                    <span id="progress-text">0 / 99 款 (0%)</span>
                </div>
                <div class="w-full bg-slate-100 rounded-full h-3 overflow-hidden">
                    <div id="progress-bar" class="bg-gradient-to-r from-sky-400 to-sky-500 h-full transition-all duration-300" style="width: 0%"></div>
                </div>
                <div class="text-[11px] text-slate-400 mt-1 flex gap-4">
                    <span>已收集：<span id="unique-count" class="font-bold text-sky-600">0</span> 款</span>
                    <span>重複卡：<span id="duplicate-count" class="font-bold text-orange-500">0</span> 張</span>
                </div>
            </div>
            
            <div class="flex flex-col gap-2">
                <select id="filter-type" class="w-full border border-slate-200 rounded-lg p-2 text-xs font-bold text-slate-700 focus:outline-none focus:ring-2 focus:ring-sky-400 bg-slate-50">
                    <option value="all">顯示全部卡牌 (NO.001 - NO.099)</option>
                    <optgroup label="🔍 狀態與重複篩選">
                        <option value="owned">僅顯示：已擁有</option>
                        <option value="missing">僅顯示：未擁有 (缺卡)</option>
                        <option value="duplicate">🔥 僅顯示：重複的卡 (交換用)</option>
                    </optgroup>
                    <optgroup label="🌈 依手寫筆記星等篩選">
                        <option value="star-color">🌈 彩星 頂級卡</option>
                        <option value="star-gold">👑 金星 稀有卡</option>
                        <option value="star-silver">🪙 銀星 珍藏卡</option>
                        <option value="star-white">⬜ 白星 常規卡</option>
                    </optgroup>
                    <optgroup label="✨ 經典系列 1.0 (001-035)">
                        <option value="v1-all">1.0 全部</option>
                        <option value="v1-role">1.0 角色卡牌</option>
                        <option value="v1-birthday">1.0 11周年生日</option>
                        <option value="v1-summer">1.0 夏日主題</option>
                        <option value="v1-american">1.0 美式主題</option>
                        <option value="v1-shop">1.0 門市滿額抽</option>
                    </optgroup>
                    <optgroup label="🍧 經典系列 2.0 (036-065)">
                        <option value="v2-all">2.0 全部</option>
                        <option value="v2-role">2.0 角色款</option>
                        <option value="v2-taiwan">2.0 臺灣百味</option>
                        <option value="v2-lazy">2.0 懶洋洋</option>
                    </optgroup>
                    <optgroup label="🤖 經典系列 3.0 (066-099)">
                        <option value="v3-all">3.0 全部</option>
                        <option value="v3-role">3.0 角色卡牌</option>
                        <option value="v3-baby">3.0 BABY主題</option>
                        <option value="v3-cyber">3.0 CyberPunCAT</option>
                        <option value="v3-festival">3.0 祭典主題</option>
                        <option value="v3-safari">3.0 郊遊主題</option>
                    </optgroup>
                </select>
                <div class="flex gap-2">
                    <button onclick="exportData()" class="flex-1 text-[10px] bg-slate-100 text-slate-600 font-bold py-1 rounded">📤 備份代碼</button>
                    <button onclick="importData()" class="flex-1 text-[10px] bg-slate-100 text-slate-600 font-bold py-1 rounded">📥 匯入進度</button>
                </div>
            </div>
        </div>

        <div id="cards-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-2.5">
            </div>
    </div>

    <script>
        const cardData = [];

        // 手寫校對版星等分組
        const silvers = [72,73,75,78,79,82,83,89,95,97, 4, 10, 12, 14, 17, 20, 23, 27, 28, 33, 34, 35, 36, 39, 40, 44, 47, 51, 53, 54, 62, 65];
        const golds = [69,74,85,96, 13, 15, 16, 26, 38, 45, 55, 60, 64];
        const colors = [77, 86, 93, 42, 57];

        // 核心精確算法：針對三張長圖不同留白，算出完美的背景中心百分比座標
        function getSpritePositionStyle(index, gen) {
            let row, col;
            let startY = 0;
            let stepY = 0;

            if (gen === 'v1') {
                startY = 14.88; // 頂部橫幅留白起點 %
                stepY = 10.37;  // 每列卡片高度 %
                if (index <= 15) { row = Math.floor((index-1)/3); col = (index-1)%3; }
                else if (index <= 20) { row = 5; col = (index-16)%2; }
                else if (index <= 25) { row = 6; col = (index-21)%3; }
                else if (index <= 30) { row = 7; col = (index-26)%3; }
                else { row = 8; col = (index-31)%2; startY = 14.65; }
            } else if (gen === 'v2') {
                startY = 14.18;
                stepY = 10.32;
                if (index <= 50) { row = Math.floor((index-36)/3); col = (index-36)%3; }
                else if (index <= 60) { row = 5 + Math.floor((index-51)/3); col = (index-51)%3; }
                else { row = 8; col = (index-61)%3; }
            } else {
                startY = 13.98;
                stepY = 10.42;
                if (index <= 74) { row = Math.floor((index-66)/3); col = (index-66)%3; }
                else if (index <= 85) { row = 3 + Math.floor((index-75)/3); col = (index-75)%3; }
                else if (index <= 90) { row = 6; col = (index-86)%2; }
                else if (index <= 95) { row = 7; col = (index-91)%2; }
                else { row = 8; col = (index-96)%2; }
            }

            // X 軸移動（3欄剛好對應 0%, 50%, 100%）
            const posX = col * 50;
            
            // Y 軸移動（利用總長度公式精準換算背景點）
            // 這裡的核心公式轉化為 CSS 能夠在縮放時鎖死百分比的 background-position
            const totalRows = gen === 'v1' ? 8 : 8;
            const posY = (startY + (row * stepY)) / (100 - stepY) * 100;

            return `background-image: url('${gen}.jpg'); background-position: ${posX}% ${posY}%;`;
        }

        for (let i = 1; i <= 99; i++) {
            const idStr = i.toString().padStart(3, '0');
            let gen = i <= 35 ? "v1" : (i <= 65 ? "v2" : "v3");       
            let subType = "";   
            let subName = "";   
            let tagClass = "";
            
            let starType = "star-white";
            let starName = "⬜ 白星 常規";
            let starClass = "bg-slate-100 text-slate-600 border-slate-200";

            if (gen === "v1") {
                tagClass = "bg-blue-50 text-blue-600 border-blue-100";
                if (i <= 15) { subType = "v1-role"; subName = "1.0 角色"; }
                else if (i <= 20) { subType = "v1-birthday"; subName = "1.0 生日"; }
                else if (i <= 25) { subType = "v1-summer"; subName = "1.0 夏日"; }
                else if (i <= 30) { subType = "v1-american"; subName = "1.0 美式"; }
                else { subType = "v1-shop"; subName = "1.0 門市抽"; }
            } else if (gen === "v2") {
                tagClass = "bg-amber-50 text-amber-600 border-amber-100";
                if (i <= 50) { subType = "v2-role"; subName = "2.0 角色"; }
                else if (i <= 60) { subType = "v2-taiwan"; subName = "2.0 小吃"; }
                else { subType = "v2-lazy"; subName = "2.0 懶洋洋"; }
            } else {
                tagClass = "bg-purple-50 text-purple-600 border-purple-100";
                if (i <= 74) { subType = "v3-role"; subName = "3.0 角色"; }
                else if (i <= 85) { subType = "v3-baby"; subName = "3.0 BABY"; }
                else if (i <= 90) { subType = "v3-cyber"; subName = "3.0 Cyber"; }
                else if (i <= 95) { subType = "v3-festival"; subName = "3.0 祭典"; }
                else { subType = "v3-safari"; subName = "3.0 郊遊"; }
            }

            if (colors.includes(i)) {
                starType = "star-color"; starName = "🌈 彩星 頂級"; starClass = "bg-gradient-to-r from-red-100 via-orange-100 to-yellow-100 text-red-700 border-orange-300 font-bold";
            } else if (golds.includes(i)) {
                starType = "star-gold"; starName = "👑 金星 稀有"; starClass = "bg-amber-100 text-amber-700 border-amber-300";
            } else if (silvers.includes(i)) {
                starType = "star-silver"; starName = "🪙 銀星 珍藏"; starClass = "bg-zinc-100 text-zinc-700 border-zinc-300";
            }

            cardData.push({
                id: idStr,
                name: `卡牌 NO.${idStr}`,
                gen: gen,
                subType: subType,
                subName: subName,
                tagClass: tagClass,
                spriteStyle: getSpritePositionStyle(i, gen),
                starType: starType,
                starName: starName,
                starClass: starClass
            });
        }

        let myCollection = JSON.parse(localStorage.getItem('capoo_cards_bg_sprite_v1')) || {};
        cardData.forEach(card => {
            if (myCollection[card.id] === undefined) myCollection[card.id] = 0;
        });

        const cardsGrid = document.getElementById('cards-grid');
        const filterType = document.getElementById('filter-type');

        function renderCards() {
            cardsGrid.innerHTML = '';
            const filter = filterType.value;
            
            let ownedCount = 0;
            let duplicateCount = 0;

            cardData.forEach(card => {
                const count = myCollection[card.id] || 0;
                if (count > 0) ownedCount++;
                if (count > 1) duplicateCount += (count - 1);
            });

            const percent = Math.round((ownedCount / 99) * 100);
            document.getElementById('progress-text').innerText = `${ownedCount} / 99 款 (${percent}%)`;
            document.getElementById('progress-bar').style.width = `${percent}%`;
            document.getElementById('unique-count').innerText = ownedCount;
            document.getElementById('duplicate-count').innerText = duplicateCount;

            cardData.forEach(card => {
                const count = myCollection[card.id] || 0;
                
                if (filter !== 'all') {
                    if (filter === 'owned' && count === 0) return;
                    if (filter === 'missing' && count > 0) return;
                    if (filter === 'duplicate' && count <= 1) return;
                    if (filter.startsWith('star-') && card.starType !== filter) return;
                    if (filter === 'v1-all' && card.gen !== 'v1') return;
                    if (filter === 'v2-all' && card.gen !== 'v2') return;
                    if (filter === 'v3-all' && card.gen !== 'v3') return;
                    if (!filter.startsWith('star-') && filter !== 'owned' && filter !== 'missing' && filter !== 'duplicate' && filter !== 'v1-all' && filter !== 'v2-all' && filter !== 'v3-all' && card.subType !== filter) return;
                }

                const isOwned = count > 0;
                const cardEl = document.createElement('div');
                let borderStyle = isOwned ? "border-sky-400 ring-2 ring-sky-100" : "border-slate-200";
                const isDuplicate = count > 1;

                cardEl.className = `bg-white rounded-xl shadow-sm p-2 flex flex-col justify-between border relative transition-all duration-200 ${borderStyle}`;
                
                cardEl.innerHTML = `
                    <div>
                        <div class="flex justify-between items-center mb-1">
                            <span class="text-[10px] font-bold font-mono px-1 bg-slate-100 rounded text-slate-500">NO.${card.id}</span>
                            <span class="text-[9px] font-bold px-1 border rounded ${card.tagClass}">${card.subName}</span>
                        </div>
                        <div class="text-center mb-1.5">
                            <span class="text-[9px] font-bold px-1.5 py-0.5 border rounded-full block text-center truncate ${card.starClass}">
                                ${card.starName}
                            </span>
                        </div>
                        <div class="capoo-card-box mb-1.5 shadow-inner">
                            <div class="capoo-sprite ${isOwned ? '' : 'card-gray'}" style="${card.spriteStyle}"></div>
                        </div>
                    </div>
                    
                    <div class="mt-1 flex items-center justify-between bg-slate-50 rounded-md p-0.5">
                        <button onclick="updateCount('${card.id}', -1)" class="w-6 h-6 rounded bg-white border border-slate-200 text-slate-600 font-bold active:scale-95 transition-all text-xs">-</button>
                        <span class="font-bold text-xs ${count > 0 ? 'text-slate-800' : 'text-slate-300'}">${count}</span>
                        <button onclick="updateCount('${card.id}', 1)" class="w-6 h-6 rounded bg-sky-500 text-white font-bold active:scale-95 transition-all text-xs">+</button>
                    </div>
                    
                    ${isDuplicate ? `<div class="absolute -top-1 -right-1 bg-orange-500 text-white font-bold text-[9px] px-1.5 py-0.5 rounded-full shadow-sm">多 ${count - 1}</div>` : ''}
                `;
                cardsGrid.appendChild(cardEl);
            });
        }

        window.updateCount = function(id, delta) {
            let current = myCollection[id] || 0;
            current += delta;
            if (current < 0) current = 0;
            
            myCollection[id] = current;
            localStorage.setItem('capoo_cards_bg_sprite_v1', JSON.stringify(myCollection));
            renderCards();
        };

        window.exportData = function() {
            const dataStr = btoa(JSON.stringify(myCollection));
            navigator.clipboard.writeText(dataStr).then(() => alert("進度代碼已成功複製！"));
        };

        window.importData = function() {
            const code = prompt("請貼上進度代碼：");
            if (!code) return;
            try {
                const parsed = JSON.parse(atob(code));
                if (typeof parsed === 'object') {
                    myCollection = parsed;
                    localStorage.setItem('capoo_cards_bg_sprite_v1', JSON.stringify(myCollection));
                    renderCards();
                    alert("匯入成功！");
                }
            } catch (e) { alert("代碼有誤"); }
        };

        filterType.addEventListener('change', renderCards);
        renderCards();
    </script>
</body>
</html>
